<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>KJ Raycing Globe Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.9.0/dist/maplibre-gl.css"/>
  <script src="https://unpkg.com/maplibre-gl@5.9.0/dist/maplibre-gl.js"></script>

  <style>
    html, body, #map {
      height: 100%;
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: #f7f7f5;
    }

    #map {
      position: absolute;
      inset: 0;
    }

    .panel {
      position: absolute;
      top: 18px;
      left: 18px;
      z-index: 10;
      width: min(390px, calc(100vw - 36px));
      max-height: calc(100vh - 36px);
      overflow: auto;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 20px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.12);
      padding: 16px;
    }

    .title {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 12px;
      color: #111827;
    }

    .count {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      color: #111827;
      background: #f3f4f6;
      border-radius: 999px;
      padding: 8px 12px;
      margin-bottom: 12px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #ef4444;
      flex: 0 0 auto;
    }

    .search-wrap {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .search-wrap input {
      flex: 1;
      border: 1px solid #d1d5db;
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 14px;
      outline: none;
      background: white;
    }

    .search-wrap button {
      border: 0;
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 14px;
      cursor: pointer;
      background: #111827;
      color: white;
    }

    .status {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 10px;
    }

    .results {
      display: grid;
      gap: 8px;
    }

    .result {
      padding: 12px;
      border-radius: 16px;
      background: rgba(249,250,251,0.95);
      border: 1px solid rgba(0,0,0,0.05);
      cursor: pointer;
      transition: transform 0.12s ease, background 0.12s ease;
    }

    .result:hover {
      transform: translateY(-1px);
      background: white;
    }

    .result-name {
      font-size: 14px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 4px;
    }

    .result-loc {
      font-size: 13px;
      color: #4b5563;
    }

    .maplibregl-popup-content {
      border-radius: 16px;
      padding: 14px 14px 12px;
      font-family: Inter, Arial, sans-serif;
      box-shadow: 0 12px 30px rgba(0,0,0,0.15);
    }

    .popup-name {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 6px;
      color: #111827;
    }

    .popup-location {
      font-size: 13px;
      color: #4b5563;
      margin-bottom: 8px;
    }

    .popup-link a {
      color: #2563eb;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
    }

    .marker {
      width: 16px;
      height: 16px;
      border-radius: 999px;
      background: #ef4444;
      border: 2px solid white;
      box-shadow: 0 4px 18px rgba(239,68,68,0.45);
    }

    @media (max-width: 680px) {
      .panel {
        width: calc(100vw - 24px);
        left: 12px;
        top: 12px;
        max-height: 48vh;
      }
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div class="panel">
    <div class="title">KJ Raycing VF-1 and VF-2 Crosskart builders Location Map</div>

    <div class="count">
      <span class="dot"></span>
      <span id="count">Loading...</span>
    </div>

    <div class="search-wrap">
      <input id="search" type="text" placeholder="Search name or location">
      <button id="clearBtn">Clear</button>
    </div>

    <div class="status" id="status">Loading markers...</div>
    <div class="results" id="results"></div>
  </div>

  <script>
    const DATA_URL = 'PASTE_YOUR_APPS_SCRIPT_DATA_URL_HERE';

    const countEl = document.getElementById('count');
    const statusEl = document.getElementById('status');
    const resultsEl = document.getElementById('results');
    const searchEl = document.getElementById('search');
    const clearBtn = document.getElementById('clearBtn');

    const START_CENTER = [-20, 25];
    const START_ZOOM = 1.35;

    const map = new maplibregl.Map({
      container: 'map',
      style: {
        version: 8,
        sources: {
          osm: {
            type: 'raster',
            tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
            tileSize: 256,
            attribution: '&copy; OpenStreetMap contributors'
          }
        },
        layers: [
          {
            id: 'osm',
            type: 'raster',
            source: 'osm'
          }
        ]
      },
      center: START_CENTER,
      zoom: START_ZOOM,
      pitch: 0,
      bearing: 0
    });

    let allData = [];
    let markerObjects = [];

    function setStatus(msg) {
      statusEl.textContent = msg;
    }

    function clearMarkers() {
      markerObjects.forEach(obj => obj.remove());
      markerObjects = [];
    }

    function escapeHtml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function escapeAttr(str) {
      return String(str || '').replace(/"/g, '&quot;');
    }

    function popupHtml(p) {
      return `
        <div class="popup-name">${escapeHtml(p.fullName || '')}</div>
        <div class="popup-location">${escapeHtml(p.location || '')}</div>
        ${p.facebookLink ? `<div class="popup-link"><a href="${escapeAttr(p.facebookLink)}" target="_blank" rel="noopener noreferrer">View Facebook Profile</a></div>` : ''}
      `;
    }

    function renderResults(list) {
      resultsEl.innerHTML = '';

      if (!list.length) {
        resultsEl.innerHTML = '<div class="result"><div class="result-name">No results</div><div class="result-loc">Try a different name or location.</div></div>';
        return;
      }

      list.forEach(p => {
        const div = document.createElement('div');
        div.className = 'result';
        div.innerHTML = `
          <div class="result-name">${escapeHtml(p.fullName || '')}</div>
          <div class="result-loc">${escapeHtml(p.location || '')}</div>
        `;
        div.onclick = () => flyToPerson(p);
        resultsEl.appendChild(div);
      });
    }

    function flyToPerson(p) {
      map.flyTo({
        center: [p.lng, p.lat],
        zoom: 3.8,
        speed: 1.05,
        curve: 1.2,
        essential: true
      });

      const match = markerObjects.find(m => m.__data === p);
      if (match) {
        match.togglePopup();
      }
    }

    function drawMarkers(data) {
      allData = data || [];
      countEl.textContent = `People on map: ${allData.length}`;

      clearMarkers();

      allData.forEach(p => {
        const el = document.createElement('div');
        el.className = 'marker';

        const popup = new maplibregl.Popup({ offset: 16, closeButton: true })
          .setHTML(popupHtml(p));

        const marker = new maplibregl.Marker({ element: el })
          .setLngLat([p.lng, p.lat])
          .setPopup(popup)
          .addTo(map);

        marker.__data = p;
        markerObjects.push(marker);
      });

      map.jumpTo({
        center: START_CENTER,
        zoom: START_ZOOM,
        bearing: 0,
        pitch: 0
      });

      if (allData.length > 0) {
        setStatus(`Loaded ${allData.length} marker(s)`);
      } else {
        setStatus('No markers found in sheet');
      }

      renderResults(allData);
    }

    async function loadMarkers() {
      try {
        setStatus('Loading markers...');
        const res = await fetch(DATA_URL + '&t=' + Date.now());
        const payload = await res.json();

        if (!payload.ok) {
          setStatus('Error: ' + payload.error);
          return;
        }

        drawMarkers(payload.markers || []);
      } catch (err) {
        setStatus('Fetch error: ' + err);
      }
    }

    function applySearch() {
      const q = searchEl.value.toLowerCase().trim();

      if (!q) {
        renderResults(allData);
        return;
      }

      const filtered = allData.filter(p =>
        `${p.fullName || ''} ${p.location || ''}`.toLowerCase().includes(q)
      );

      renderResults(filtered);
    }

    map.on('load', () => {
      map.setProjection({ type: 'globe' });
      map.addControl(new maplibregl.NavigationControl({ visualizePitch: true }), 'top-right');
      loadMarkers();
      setInterval(loadMarkers, 60000);
    });

    searchEl.addEventListener('input', applySearch);
    clearBtn.addEventListener('click', () => {
      searchEl.value = '';
      renderResults(allData);
    });
  </script>
</body>
</html>
